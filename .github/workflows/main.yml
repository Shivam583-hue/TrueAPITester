name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: trueapitester-linux-amd64

          - os: linux-arm64
            runner: ubuntu-latest
            goos: linux
            goarch: arm64
            binary: trueapitester-linux-arm64

          - os: macos-amd64
            runner: macos-latest
            goos: darwin
            goarch: amd64
            binary: trueapitester-macos-amd64

          - os: macos-arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
            binary: trueapitester-macos-arm64

          - os: windows-amd64
            runner: windows-latest
            goos: windows
            goarch: amd64
            binary: trueapitester-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o ${{ matrix.binary }} ./cmd/APITester

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: binaries/*
          generate_release_notes: true
